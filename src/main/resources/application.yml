  # ===============================
  # JPA / HIBERNATE CONFIGURATION
  # ===============================
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        # --- Performance Tuning (Batching) ---

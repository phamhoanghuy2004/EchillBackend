server:
  port: ${SERVER_PORT:8080}

spring:
  main:
    lazy-initialization: true # 🚀 VŨ KHÍ BÍ MẬT: Giảm 50% thời gian khởi động
  application:
    name: echill-backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}


  # ===============================
  # DATABASE CONFIGURATION
  # ===============================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD} # ⚠️ Nhớ giấu đi khi đưa lên GitHub nhé!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===============================
  # JPA / HIBERNATE CONFIGURATION
  # ===============================
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none # 🚀 Tắt kiểm tra schema để khởi động cực nhanh
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

  # ===============================
  # REDIS CONFIGURATION (Aiven / Valkey)
  # ===============================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

  # ===============================
  # EMAIL CONFIGURATION (Gmail SMTP)
  # ===============================
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: ${GEMINI_MODEL:gemini-2.5-flash}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE

# ===============================
# JWT CONFIGURATION
# ===============================
jwt:
  signerKey: ${JWT_SIGNER_KEY} # ⚠️ Nhớ đổi key khác khi lên Production!
  valid-duration: ${JWT_VALID_DURATION:7200} # in seconds (2 giờ)
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:604800} # in seconds (7 ngày)

# ===============================
# OTP CONFIGURATION
# ===============================
otp:
  prefix: ${OTP_PREFIX:otp:register:}
  expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
  resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:60}

# ===============================
# GOOGLE OAUTH2 CONFIGURATION
# ===============================
google:
  client-id: ${GOOGLE_CLIENT_ID}

# ===============================
# CLOUDINARY CONFIGURATION
# ===============================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
  video:
    eager-profile: ${CLOUDINARY_VIDEO_PROFILE:sp_full_hd/m3u8}
  webhook-url: ${CLOUDINARY_WEBHOOK_URL}

# ===============================
# VNpay CONFIGURATION
# ===============================
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL}

app:
  test:
    default-section-name: ${DEFAULT_SECTION_NAME:Phần thi mặc định} # Hoặc "Default Section"
    max-questions-per-file: ${MAX_QUESTIONS_PER_FILE:2000} # Giới hạn số câu hỏi (Fix lỗi 5)
